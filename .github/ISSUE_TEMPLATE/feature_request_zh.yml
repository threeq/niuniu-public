name: 💡 功能建议(中文)
description: 提出新功能或现有功能的改进
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提建议。先想清楚要解决的问题再写,比直接给方案更有帮助。

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      description: 现在的痛点是什么?在什么场景下遇到?
      placeholder: |
        每次切 workspace 都要手工选目录,重复操作太多 ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你设想的方案(可选)
      description: 如果你有具体设计或参考产品,写下来;没有也没关系,我们会自己想。
      placeholder: |
        最近用过的 workspace 加到右上角的快捷下拉,5 个为限 ...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案(可选)
      description: 你试过的其他做法,或别的产品是怎么处理的
      placeholder: 我现在用 alfred 配快捷打开,但这种 hack 不能在不同设备同步。
    validations:
      required: false
